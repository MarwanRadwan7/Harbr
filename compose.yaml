services:
  elasticsearch:
    image: 'elasticsearch:7.17.10'
    environment:
      - 'ELASTIC_PASSWORD=secret'
      - 'discovery.type=single-node'
      - 'xpack.security.enabled=false'
    ports:
      - '9200:9200'
      - '9300:9300'

  postgres:
    image: 'postgres:latest'
    environment:
      - 'POSTGRES_DB=harbr'
      - 'POSTGRES_USER=harbr'
      - 'POSTGRES_PASSWORD=secret'
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql

  rabbitmq:
    image: 'rabbitmq:latest'
    environment:
      - 'RABBITMQ_DEFAULT_USER=harbr'
      - 'RABBITMQ_DEFAULT_PASS=secret'
    ports:
      - '5672:5672'
      - '15672:15672'

  redis:
    image: 'redis:latest'
    ports:
      - '6379:6379'

volumes:
  db_data:
